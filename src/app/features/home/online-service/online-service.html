<section class="online-service">
    <div class="online-service__container">

        <div class="online-service__icon-wrapper" appScrollAnimate>
            <lucide-icon [img]="Video" [size]="28" class="online-service__icon"></lucide-icon>
        </div>

        <h2 class="online-service__title" appScrollAnimate>
            Atendimento online para todo o Brasil
        </h2>

        <p class="online-service__description" appScrollAnimate>
            Sessões seguras e sigilosas no conforto da sua casa. Através de plataformas
            profissionais de videochamada, garantindo privacidade e qualidade no atendimento.
        </p>

        <button class="online-service__cta" appScrollAnimate (click)="openWhatsApp()">
            Agendar agora
        </button>

    </div>
</section>
